<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ドット絵モンスター工房</title>
    <style>
        :root { --bg-color: #d2b48c; --primary: #4a90e2; --accent: #ff6b6b; --panel-bg: rgba(255, 255, 255, 0.9); }
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg-color); display: flex; }
        
        button { cursor: pointer; border: none; padding: 8px 12px; border-radius: 6px; transition: all 0.2s; font-size: 14px; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button.active { background-color: var(--primary) !important; color: white; }

        .anim-attack { animation: attack-jump 0.3s ease-out; }
        @keyframes attack-jump {
            0%, 100% { transform: translate(-50%, -50%); }
            50% { transform: translate(-50%, calc(-50% - 40px)); }
        }

        .anim-damage-p { animation: damage-kb-p 0.3s ease-out; }
        @keyframes damage-kb-p {
            0%, 100% { transform: translate(-50%, -50%); }
            50% { transform: translate(calc(-50% - 30px), -50%); }
        }

        .anim-damage-e { animation: damage-kb-e 0.3s ease-out; }
        @keyframes damage-kb-e {
            0%, 100% { transform: translate(-50%, -50%); }
            50% { transform: translate(calc(-50% + 30px), -50%); }
        }

        #editor-view { display: none; width: 100%; height: 100%; position: relative; flex-direction: column; background: #333; }
        #canvas-container { flex: 1; width: 100%; height: 100%; overflow: hidden; position: relative; background: #222; }
        canvas { 
            image-rendering: pixelated; position: absolute; top: 0; left: 0; transform-origin: 0 0; cursor: crosshair; 
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%), linear-gradient(-45deg, #eee 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #eee 75%), linear-gradient(-45deg, transparent 75%, #eee 75%);
            background-size: 2px 2px; background-color: white;
        }

        .panel { background: var(--panel-bg); padding: 10px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); backdrop-filter: blur(5px); z-index: 100; position: absolute; display: flex; gap: 8px; flex-wrap: wrap; }
        #top-panel { top: 10px; left: 10px; right: 10px; justify-content: space-between; align-items: center; }
        #tool-panel { bottom: 20px; left: 50%; transform: translateX(-50%); justify-content: center; }
        #zoom-panel { bottom: 20px; right: 20px; flex-direction: column; }
        #status-display { position: absolute; bottom: 80px; left: 20px; background: rgba(0,0,0,0.5); color: white; padding: 5px 10px; border-radius: 4px; font-size: 12px; pointer-events: none; z-index: 90;}

        #field-view { width: 100%; height: 100%; position: relative; overflow: hidden; background-color: #8dbd5d; }
        #monster-field-area { width: 100%; height: 100%; position: absolute; top: 0; left: 0; pointer-events: none; }
        #btn-to-book { position: absolute; top: 20px; left: 20px; background: #5d4037; color: white; border: 3px solid #3e2723; z-index: 10; padding: 10px 20px; }
        .monster { position: absolute; image-rendering: pixelated; transform: translate(-50%, -50%); z-index: 5; }

        #book-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        #book-content { background: #fdf5e6; border: 6px solid #5d4037; width: 95%; max-width: 650px; padding: 20px; position: relative; max-height: 85vh; overflow-y: auto; }
        #monster-list { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .book-item { display: flex; flex-direction: column; padding: 10px; border: 4px solid #d2b48c; background: #fff; border-radius: 8px; }
        .item-main { display: flex; align-items: center; gap: 15px; }
        .name-input { border: 1px solid #ccc; padding: 4px; border-radius: 4px; width: 100px; font-size: 14px; }

        #battle-screen { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #444; z-index: 2000; color: white; font-family: monospace; }
        #battle-area { 
            height: 100%; width: 100%; position: relative; overflow: hidden; background-color: #bbb;
            background-image: linear-gradient(335deg, #ccc 23px, transparent 23px), linear-gradient(155deg, #ccc 23px, transparent 23px), linear-gradient(335deg, #ccc 23px, transparent 23px), linear-gradient(155deg, #ccc 23px, transparent 23px);
            background-size: 58px 58px; background-position: 0px 2px, 4px 35px, 29px 31px, 34px 6px;
        }
        #battle-log { position: absolute; top: 10px; left: 10px; width: 250px; height: 180px; background: rgba(0, 0, 0, 0.7); padding: 10px; font-size: 12px; overflow-y: scroll; border: 1px solid #888; border-radius: 5px; z-index: 2100; }
        #battle-controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 2100; }

        #floor-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 4000; align-items: center; justify-content: center; }
        #floor-content { background: #333; color: white; padding: 30px; border: 4px solid #fff; border-radius: 15px; text-align: center; }

        #settings-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 3000; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="editor-view">
        <div id="top-panel" class="panel">
            <button onclick="goToField()">🔙 草原へ</button>
            <select id="gridSize"><option value="16">16x16</option><option value="32" selected>32x32</option><option value="64">64x64</option></select>
            <button id="btn-save-monster" style="background: #4CAF50; color: white;">✨ 完成</button>
        </div>
        <div id="canvas-container"><canvas id="paintCanvas"></canvas></div>
        <div id="status-display"></div>
        <div id="zoom-panel" class="panel"><button onclick="zoom(1.2)">➕</button><button onclick="zoom(0.8)">➖</button><button onclick="resetView()">🔄</button></div>
        <div id="tool-panel" class="panel">
            <input type="color" id="colorPicker" value="#333333">
            <button id="tool-pen" onclick="setTool('pen')" class="active">🖊️</button>
            <button id="tool-eraser" onclick="setTool('eraser')">🧽</button>
            <button id="tool-bucket" onclick="setTool('bucket')">🪣</button>
            <button id="tool-picker" onclick="setTool('picker')">🧪</button>
            <input type="range" id="penSize" min="1" max="5" value="1">
            <button onclick="clearCanvas()" style="background: var(--accent); color: white;">🗑️</button>
        </div>
    </div>

    <div id="field-view">
        <button id="btn-to-book" onclick="openBookModal()">📖 モンスター図鑑</button>
        <button onclick="openFloorSelect()" style="position:absolute; bottom:20px; left:20px; background:maroon; color:white; padding:15px; border-radius:10px; z-index:100;">⚔️ ダンジョン探索</button>
        <div id="monster-field-area"></div>
    </div>

    <div id="floor-modal">
        <div id="floor-content">
            <h3>探索階層の選択</h3>
            <p>開始する階を選んでください：</p>
            <select id="floor-select-dropdown" style="padding: 10px; font-size: 18px; width: 150px; margin-bottom: 20px;"></select><br>
            <button onclick="confirmFloorAndStart()" style="background: green; color: white; padding: 10px 30px;">出発</button>
            <button onclick="document.getElementById('floor-modal').style.display='none'" style="background: #555; color: white; padding: 10px 20px;">キャンセル</button>
        </div>
    </div>

    <div id="book-modal">
        <div id="book-content">
            <span onclick="closeBookModal()" style="position:absolute; right:15px; top:10px; cursor:pointer; font-size:24px;">&times;</span>
            <h3>📖 図鑑 <span id="monster-count"></span></h3>
            <div id="monster-list"></div>
            <div id="create-new-area" style="text-align:center; margin-top:20px;">
                <button onclick="createNewMonster()" style="background:#88aa44; color:white; padding:10px 20px;">➕ 新しい仲間を描く</button>
            </div>
        </div>
    </div>

    <div id="battle-screen">
        <div id="battle-area">
            <div id="floor-indicator" style="position:absolute; top:10px; right:10px; padding:10px; background:rgba(0,0,0,0.5); border-radius:5px;">1階</div>
            <div id="battle-log"></div>
            <div id="battle-unit-layer" style="width:100%; height:100%; position:relative;"></div>
        </div>
        <div id="battle-controls">
            <button id="btn-speed-toggle" style="background:#444; color:white; width: 80px;" onclick="toggleBattleSpeed()">倍速:1x</button>
            <button id="btn-next-floor" style="display:none; background:green; color:white; padding:10px 20px;" onclick="nextFloor()">次の階へ</button>
            <button style="background:#222; color:white; padding:10px 20px;" onclick="exitDungeon()">撤退</button>
        </div>
    </div>

    <button id="settings-btn" style="position:fixed; top:10px; right:10px; z-index:1001; background:#333; color:white;">⚙️ 設定</button>
    <div id="settings-modal">
        <div style="background:#333; color:white; padding:20px; border:3px solid #fff; border-radius:10px; text-align:center;">
            <h3>SETTINGS</h3>
            BGM: <input type="range" id="bgm-slider" min="0" max="1" step="0.01" value="0.08"><br><br>
            SE: <input type="range" id="se-slider" min="0" max="1" step="0.01" value="0.5"><br><hr style="border:0.5px solid #555;">
            <button onclick="resetData()" style="background: maroon; color: white; margin-bottom: 10px; width: 100%;">データ全消去</button><br>
            <button onclick="document.getElementById('settings-modal').style.display='none'" style="width: 100%;">閉じる</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
